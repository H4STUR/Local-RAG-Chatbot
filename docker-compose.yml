services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag_chatbot
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:give 